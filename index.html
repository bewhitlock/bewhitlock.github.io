<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben Whitlock</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      overflow: hidden;
      color:#515152;
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1vh 2vw;
      z-index: 10;
      width: 50vw;
    }
    
    .header-btns {
      display: flex;
      padding: 0 3vw;
    }

    .btn {
      font-size: 3vh;
      padding: 1vh 1vw;
      margin-left: 1vw;
      background-color: #9B9B93;
      color: white;
      border: 1px solid #FFFFFF;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      background-color: #7F7F76;
    }

    .github-btn img {
      width: 30vh;
      height: auto;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .github-btn img:hover {
      transform: scale(1.1);
    }

    main {
      padding: 0px;
    }

    .split {
      display:flex;
      width: 100vw;
      height: 100vh;
    }

    .left {
      flex: 0 0 50vw;
      background:linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('images/car.jpeg');
      background-size: cover;
      background-position: center;
      color: white;
    
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .right {
      max-width: 50vw;
      margin-right: 10vw;
      margin-left: 10vw;
      text-align: center;
    }

    .portrait {
      display: flex;
      justify-content: center;
      margin-top: 5vh;
    }

  </style>
</head>

<body>

  <header>
    <img src=images/niu-reverse-logo.svg alt="Niu Logo" width=200>
      <div class=header-btns>
        <button class="btn" onclick="window.open('cv.pdf', '_blank')">CV</button>
        <button class="btn" onclick="window.location.href='https://google.com';">Projects</button>
      </div>
  </header>

  <main>
    <div class=split>
      <div class=left>
        <a href="https://github.com/bewhitlock" target="_blank" class="github-btn">
          <img src="images/GitHub_Lockup_White_Clearspace.png" alt="GitHub">
        </a>
      </div>
      <div class=right>
        <br>
        <h1>Ben Whitlock</h1>
        <hr>
          <div class=portrait>
            <img src="images/portrait.JPEG" width=300 alt="headshot">
          </div>
        <p> I'm an undergrad pursuing electrical engineering at NIU. I'm interested in control systems, PCB's, and FPGA's.
            I love to learn, and I want to try as many new things as possible.</p>
      </div>
    </div>
  </main>
</body>
</html>
