  <style>
    body {

      color:#515152;

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1vh 2vw;
      z-index: 10;

    .header-btns {
      display: flex;
      padding: 0 3vw;
    }

    .btn {

      color: white;
      border: 1px solid #FFFFFF;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      background-color: #7F7F76;
    }

    main {
    }

</head>

      <div class=header-btns>

        <button class="btn" onclick="window.location.href='projects.html';">Projects</button>

  <main>

</html>
